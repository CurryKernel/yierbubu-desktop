appId: com.yierbubu.desktop-pet
productName: "一二布布桌面宠物"
directories:
  output: dist
  buildResources: build
files:
  - main.js
  - preload.js
  - index.html
  - settings.html
  - src/**/*
  - styles/**/*
  - assets/**/*
win:
  target: nsis
mac:
  target: dmg
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
